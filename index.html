<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon GO Hotspots</title>

<style>
:root {
    --bg-image: url('https://lh3.googleusercontent.com/PWSt8OX5qG416x9n9SAfktLM_n_CbEVCSo9_V4OKdnaOlN_veHLikyOEHqlDOAZqHwFsrAdMXH_dOzyf8l-jsX_5pQq1hR4DEQ=e365-pa-nu-w2880-rw');
    --logo-image: url('https://upload.wikimedia.org/wikipedia/commons/2/23/Pok%C3%A9mon_GO_logo.svg');
    --bg-color-container: rgba(240,242,245,0.60);
    --accordion-header-bg:#2e4f4f;
    --accordion-header-hover:#243e3e;
    --btn-copy-bg:#0084ff;
    --btn-copy-hover:#0066cc;
    --text-main:#1c1e21;
}

/* KEEPING YOUR ORIGINAL DESIGN EXACT */
body {
    font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
    margin:0;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    background-image: var(--bg-image);
    background-size:cover;
}

.container {
    max-width:500px;
    width:100%;
    background:var(--bg-color-container);
    padding:20px;
    border-radius:16px;
    margin-top:40px;
    backdrop-filter:blur(8px);
}

.main-logo{width:200px; content:var(--logo-image);}

.accordion-item{background:#fff;border-radius:12px;margin-bottom:12px;overflow:hidden;}
.accordion-header{background:var(--accordion-header-bg);color:#fff;padding:15px;cursor:pointer;}
.accordion-content{max-height:0;overflow:hidden;transition:0.3s;}
.content-padding{padding:15px;}

.card{background:#fff;border-radius:8px;padding:15px;margin-bottom:10px;position:relative;}
.coords{font-family:monospace;background:#eee;padding:6px;border-radius:6px;}
button{cursor:pointer;padding:10px;border:none;border-radius:8px;}
.btn-copy{background:var(--btn-copy-bg);color:white;}
.btn-delete{position:absolute;top:10px;right:10px;color:red;background:none;font-size:18px;display:none;}

.admin-panel{display:none;background:#fff;padding:20px;border-radius:16px;width:100%;max-width:500px;}
</style>
</head>

<body>

<div class="container">

<img class="main-logo">

<h2>Pokémon GO Hotspots</h2>
<div id="loading-status">Loading...</div>

<div class="accordion-item">
<div class="accordion-header">PH <span id="time-ph"></span></div>
<div class="accordion-content"><div id="list-ph" class="content-padding"></div></div>
</div>

<div class="accordion-item">
<div class="accordion-header">JP <span id="time-jp"></span></div>
<div class="accordion-content"><div id="list-jp" class="content-padding"></div></div>
</div>

<div class="accordion-item">
<div class="accordion-header">BR <span id="time-br"></span></div>
<div class="accordion-content"><div id="list-br" class="content-padding"></div></div>
</div>

<button onclick="promptAdminLogin()">🔑 Admin</button>

</div>

<div class="admin-panel" id="dashboard-panel">
<select id="input-country">
<option value="ph">PH</option>
<option value="jp">JP</option>
<option value="br">BR</option>
</select>

<input id="input-name" placeholder="Location name">
<input id="input-coords" placeholder="Coords">

<button id="submit-btn" onclick="addLocationToCloud()">SAVE</button>
</div>

<script>
// CONFIG
const GIST_ID="2328a8e8f75dec3bb570d9c51d64a75d";
const GIST_RAW=`https://gist.githubusercontent.com/pacsone/${GIST_ID}/raw/hotspots.json`;
const GIST_API=`https://api.github.com/gists/${GIST_ID}`;

let data=[];
let token=localStorage.getItem("pogo_admin_token")||"";
let admin=!!token;

// LOAD
async function load(){
try{
let r=await fetch(GIST_RAW+"?t="+Date.now());
data=await r.json();

if(!Array.isArray(data)) data=[];
render();
document.getElementById("loading-status").style.display="none";

}catch(e){
document.getElementById("loading-status").innerText="Failed load";
}
}

// RENDER
function render(){
let lists={
ph:document.getElementById("list-ph"),
jp:document.getElementById("list-jp"),
br:document.getElementById("list-br")
};

Object.values(lists).forEach(el=>el.innerHTML="");

let cache={ph:"",jp:"",br:""};

data.forEach((d,i)=>{
if(!lists[d.country]) return;

cache[d.country]+=`
<div class="card">
<div>${d.name}</div>
<div class="coords" id="c${i}">${d.coords}</div>
<button class="btn-copy" onclick="copyCoords('c${i}',this)">Copy</button>
${admin?`<button class="btn-delete" style="display:block" onclick="del(${i})">✕</button>`:""}
</div>`;
});

for(let k in cache){
lists[k].innerHTML=cache[k]||"No data";
}

if(admin) document.getElementById("dashboard-panel").style.display="block";
}

// LOGIN
function promptAdminLogin(){
if(admin){
localStorage.removeItem("pogo_admin_token");
location.reload();
return;
}
let t=prompt("GitHub Token:");
if(t){
localStorage.setItem("pogo_admin_token",t.trim());
location.reload();
}
}

// SYNC
async function sync(){
let btn=document.getElementById("submit-btn");
btn.disabled=true;
btn.innerText="Syncing";

try{
let r=await fetch(GIST_API,{
method:"PATCH",
headers:{
Authorization:"token "+token,
"Content-Type":"application/json"
},
body:JSON.stringify({
files:{
"hotspots.json":{
content:JSON.stringify(data,null,2)
}
}
})
});

if(!r.ok) throw Error();

alert("Synced ✅");
location.reload();

}catch{
alert("Error sync ❌");
btn.disabled=false;
btn.innerText="SAVE";
}
}

// ADD
function addLocationToCloud(){
if(!admin) return;

let c=input-country.value;
let n=input-name.value.trim();
let co=input-coords.value.trim();

if(!n||!co) return alert("Fill all");

data.push({country:c,name:n,coords:co});
sync();
}

// DELETE
function del(i){
if(confirm("Delete?")){
data.splice(i,1);
sync();
}
}

// COPY
function copyCoords(id,btn){
navigator.clipboard.writeText(document.getElementById(id).innerText);
btn.innerText="Copied!";
setTimeout(()=>btn.innerText="Copy",1000);
}

// CLOCK
setInterval(()=>{
time-ph.innerText=new Date().toLocaleTimeString("en-US",{timeZone:"Asia/Manila"});
time-jp.innerText=new Date().toLocaleTimeString("en-US",{timeZone:"Asia/Tokyo"});
time-br.innerText=new Date().toLocaleTimeString("en-US",{timeZone:"America/Sao_Paulo"});
},1000);

// ACCORDION
document.querySelectorAll(".accordion-header").forEach(h=>{
h.onclick=()=>{
let c=h.nextElementSibling;
c.style.maxHeight=c.style.maxHeight?null:c.scrollHeight+"px";
};
});

// INIT
load();
</script>

</body>
</html>
