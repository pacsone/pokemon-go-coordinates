<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon GO Hotspots PRO</title>

<style>
:root {
    --bg-img: url('https://lh3.googleusercontent.com/PWSt8OX5qG416x9n9SAfktLM_n_CbEVCSo9_V4OKdnaOlN_veHLikyOEHqlDOAZqHwFsrAdMXH_dOzyf8l-jsX_5pQq1hR4DEQ=e365-pa-nu-w2880-rw');
}

body {
    font-family: Arial;
    margin:0;
    padding:20px;
    background: var(--bg-img) center/cover fixed;
    display:flex;
    justify-content:center;
}

.container {
    max-width:520px;
    width:100%;
    background:rgba(255,255,255,0.6);
    backdrop-filter:blur(8px);
    padding:20px;
    border-radius:16px;
}

.logo {
    width:200px;
    display:block;
    margin:auto;
}

h1 { text-align:center; }

.accordion-header {
    background:#2e4f4f;
    color:#fff;
    padding:12px;
    margin-top:10px;
    cursor:pointer;
    border-radius:8px;
}

.accordion-content {
    max-height:0;
    overflow:hidden;
    transition:0.3s;
    background:#fff;
    border-radius:8px;
}

.card {
    border-bottom:1px solid #eee;
    padding:10px;
    position:relative;
}

.coords {
    font-family:monospace;
    margin:5px 0;
}

button {
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.copy { background:#0084ff;color:#fff; }
.delete {
    position:absolute;
    top:8px;
    right:8px;
    background:none;
    color:red;
    display:none;
}

.admin-panel {
    display:none;
    margin-top:20px;
    background:#fff;
    padding:15px;
    border-radius:10px;
}

input, select {
    width:100%;
    padding:8px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/2/23/Pok%C3%A9mon_GO_logo.svg">

<h1>Pokémon GO Hotspots</h1>

<button onclick="login()">🔑 Admin</button>

<div id="loading">Loading...</div>

<!-- ACCORDION -->
<div class="accordion">

<div class="accordion-header">PH</div>
<div class="accordion-content" id="list-ph"></div>

<div class="accordion-header">JP</div>
<div class="accordion-content" id="list-jp"></div>

<div class="accordion-header">BR</div>
<div class="accordion-content" id="list-br"></div>

</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="panel">

<h3>Admin Dashboard</h3>

<select id="country">
<option value="ph">PH</option>
<option value="jp">JP</option>
<option value="br">BR</option>
</select>

<input id="name" placeholder="Location name">
<input id="coords" placeholder="Coords">

<button onclick="add()">Add Location</button>

</div>

</div>

<script>
// ✅ CONFIG (FIXED)
const GIST_ID = "2328a8e8f75dec3bb570d9c51d64a75d";
const RAW = "https://gist.githubusercontent.com/pacsone/2328a8e8f75dec3bb570d9c51d64a75d/raw/hotspots.json";
const API = `https://api.github.com/gists/${GIST_ID}`;

let DB = [];
let TOKEN = localStorage.getItem("token") || "";

// LOAD DATA
async function load(){
    try {
        const res = await fetch(RAW+"?t="+Date.now());
        DB = await res.json();
        render();
        document.getElementById("loading").style.display="none";
    } catch {
        document.getElementById("loading").innerText="Failed loading data";
    }
}

// RENDER
function render(){
    ["ph","jp","br"].forEach(c=>{
        document.getElementById("list-"+c).innerHTML="";
    });

    DB.forEach((x,i)=>{
        if(!["ph","jp","br"].includes(x.country)) return;

        let card = document.createElement("div");
        card.className="card";

        card.innerHTML = `
            <b>${x.name}</b>
            <div class="coords" id="c${i}">${x.coords}</div>
            <button class="copy" onclick="copy('c${i}',this)">Copy</button>
            <button class="delete" onclick="del(${i})">✕</button>
        `;

        if(TOKEN) card.querySelector(".delete").style.display="block";

        document.getElementById("list-"+x.country).appendChild(card);
    });

    if(TOKEN){
        document.getElementById("panel").style.display="block";
    }
}

// COPY
function copy(id,btn){
    navigator.clipboard.writeText(
        document.getElementById(id).innerText
    );
    btn.innerText="✓";
    setTimeout(()=>btn.innerText="Copy",1500);
}

// LOGIN
function login(){
    if(TOKEN){
        localStorage.removeItem("token");
        location.reload();
        return;
    }

    let t = prompt("Enter GitHub token with GIST permission");
    if(t){
        localStorage.setItem("token",t.trim());
        location.reload();
    }
}

// ADD
function add(){
    let c = country.value;
    let n = name.value.trim();
    let co = coords.value.trim();

    if(!n || !co) return alert("Fill all");

    DB.push({country:c,name:n,coords:co});
    sync();
}

// DELETE
function del(i){
    if(confirm("Delete?")){
        DB.splice(i,1);
        sync();
    }
}

// SYNC TO GITHUB
async function sync(){

    let res = await fetch(API,{
        method:"PATCH",
        headers:{
            Authorization:"token "+TOKEN,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            files:{
                "hotspots.json":{
                    content:JSON.stringify(DB,null,2)
                }
            }
        })
    });

    if(res.ok){
        alert("Synced!");
        location.reload();
    } else {
        alert("Failed. Check token.");
    }
}

// ACCORDION
document.querySelectorAll(".accordion-header").forEach(h=>{
    h.onclick=()=>{
        let c=h.nextElementSibling;
        c.style.maxHeight=c.style.maxHeight?null:c.scrollHeight+"px";
    };
});

load();
</script>

</body>
</html>
